<head>

    <title>Birthday</title>
    <style>
        /* 1. GRUNDGERÜST & HINTERGRUND */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color:  gold;
            background-color: dimgray;
            background-image: url("https://img.freepik.com/premium-vector/birthday-card-with-balloons-black-background-with-words-happy-birthday-it_1163553-5608.jpg?semt=ais_incoming&w=740&q=80");

        }


        h1  {
       
            margin-top: 350px;
            font-size: 65px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-style: oblique;
            margin-left: 260px;
        }

        h2 {
            margin-top: 00px;
            font-size: 70px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-style: oblique;
            margin-left: 280px;
        }

     
     
        /* 4. SEITENLEISTE (SIDENAV) */
        .sidenav {
            height: 100%;
            width: 0; /* Startbreite 0 */
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 10px 30px;
            text-decoration: none;
            font-size: 22px;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .sidenav a:hover {
            color: white;
        }

        .sidenav .closebtn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
        }

        /* Menü-Button (Der Auslöser) */
        .open-btn {
            font-size: 30px;
            cursor: pointer;
            position: fixed;
            top: 15px;
            left: 15px;
            color: white;
            z-index: 1001;
        }
    </style>
</head>
<body>

    <span class="open-btn" onclick="toggleNav()">&#9776;</span>

    <script>
        /* JavaScript zum Öffnen und Schließen */
        function toggleNav() {
            var nav = document.getElementById("mySidenav");
            if (nav.style.width === "250px") {
                nav.style.width = "0";
            } else {
                nav.style.width = "250px";
            }
        }
    </script>
