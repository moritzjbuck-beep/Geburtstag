<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday</title>
    <style>
        /* 1. GRUNDGERÜST & HINTERGRUND */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: gold;
            background-color: dimgray;
            background-image: url("https://img.freepik.com/premium-vector/birthday-card-with-balloons-black-background-with-words-happy-birthday-it_1163553-5608.jpg?semt=ais_incoming&w=740&q=80");
            background-size: cover;
            display: flex;
            flex-direction: column;
            
        }

        h1  {
            margin-top: 300px; /* Leicht angepasst für das Tipp-Feld */
            font-size: 65px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-style: oblique;
           
            margin-left: 100px;
        }

        h2 {
            margin-top: 0px;
            font-size: 70px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-style: oblique;
            margin-left: 200px;
        }

        /* 4. SEITENLEISTE (SIDENAV) */
        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 10px 30px;
            text-decoration: none;
            font-size: 22px;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .sidenav a:hover {
            color: white;
        }

        .sidenav .closebtn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
        }

        .open-btn {
            font-size: 30px;
            cursor: pointer;
            position: fixed;
            top: 15px;
            left: 15px;
            color: white;
            z-index: 1001;
        }

        /* TIPP & MUSIK BUTTON STYLES */
        #tipp-box {
            margin-top: 20px;
            z-index: 1000;
            margin-left: 200px;
        }

        .tipp-btn {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .tipp-btn:hover {
            transform: scale(1.1);
        }

        #tipp-text {
            display: none;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            color: #333;
            max-width: 400px;
        }

        .music-control-btn {
            display: none;
            margin: 10px auto;
            background-color: #333;
            color: white;
            border: 2px solid gold;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 160px;
        }

      
    </style>
</head>
<body>

    <audio id="bg-music" >
        <source src="Im Namen der Wissenschaft Konrad Stöckel zerstört sein Auto 8. Klasse LUKE! Die Schule und ich - LukeMockridgeTV (128k) [0꞉38-0꞉44].mp3" type="audio/mpeg">
    </audio>

    <span class="open-btn" onclick="toggleNav()">&#9776;</span>

    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">&times;</a>
        <a href="images2.html">Bilder</a>
        <a href="Festbaenkler.html">Festbänkler</a>
        <a href="Sprueche.html">Sprüche</a>
        <a href="3neue.html">Irgendwas</a>
    </div>

    <h1>Happy </h1>
    <h2>Birthday!!</h2>

    <div id="tipp-box">
        <button class="tipp-btn" onclick="playTipp()">💡 Hier klicken </button>
        <div id="tipp-text">Benutze das Menü oben links, um die Überraschungen zu entdecken!</div>
        <button id="music-btn" class="music-control-btn" onclick="toggleMusic()">Musik: Pause ||</button>
    </div>

    <script>
        /* Passwortschutz */
        const passwort = prompt("Bitte gib das Passwort ein, um die Bilder zu sehen:");
        if (passwort !== "1288OmaOpa") {
            alert("Falsches Passwort!");
            document.body.innerHTML = "<h1>Zugriff verweigert</h1>";
            window.location.href = "https://sz-folien.de/wp-content/uploads/2020/03/Art-Nr.386-Smily-Mittelfinger-1.jpg";
        }

        /* Musik & Tipp Logik */
        function playTipp() {
            var music = document.getElementById("bg-music");
            var btn = document.querySelector(".tipp-btn");
            var text = document.getElementById("tipp-text");
            var musicBtn = document.getElementById("music-btn");

            music.play().catch(function(error) {
                console.log("Musik-Autoplay wurde blockiert");
            });

            btn.style.display = "none";
            text.style.display = "block";
            musicBtn.style.display = "block";
        }

        function toggleMusic() {
            var music = document.getElementById("bg-music");
            var musicBtn = document.getElementById("music-btn");

            if (music.paused) {
                music.play();
                musicBtn.innerText = "Musik: Pause ||";
            } else {
                music.pause();
                musicBtn.innerText = "Musik: Play ▶";
            }
        }

        /* Seitenleiste Logik */
        function toggleNav() {
            var nav = document.getElementById("mySidenav");
            if (nav.style.width === "250px") {
                nav.style.width = "0";
            } else {
                nav.style.width = "250px";
            }
        }
    </script>
</body>
</html>
