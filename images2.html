<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herzlichen Glückwunsch!</title>
    <style>
        body {
            background-color: black;
            font-family: sans-serif;
            margin: 0;
            background-image: url("https://static.vecteezy.com/system/resources/thumbnails/041/038/331/small/ai-generated-colorful-confetti-on-bokeh-background-photo.jpg");
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* SIDENAV */
        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 10px 30px;
            text-decoration: none;
            font-size: 22px;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .sidenav a:hover { color: #f1f1f1; }

        .sidenav .closebtn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
        }

        .open-btn {
            font-size: 30px;
            cursor: pointer;
            position: fixed;
            top: 15px;
            left: 15px;
            color: black;
            z-index: 1500;
            background: rgba(255, 255, 255, 0.6);
            padding: 5px 15px;
            border-radius: 5px;
        }

        /* BRIEF */
        .envelope-wrapper {
            position: relative;
            width: 600px;
            height: 400px;
            background: rgb(197, 148, 156);
            cursor: pointer;
            margin-top: 150px;
            transition: transform 1.0s;
            z-index: 5;
        }

        .lid {
            position: absolute;
            top: 0px; left: 0;
            width: 0; height: 0;
            border-left: 300px solid transparent;
            border-right: 300px solid transparent;
            border-top: 150px solid pink;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 10;
        }

        .letter {
            position: absolute;
            top: 290px; left: 10px;
            width: 580px; height: 380px;
            background: white;
            z-index: 2;
            transition: transform 0.8s ease, opacity 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            opacity: 0;
        }

        .envelope-wrapper.open .lid { transform: rotateX(180deg); z-index: 1; }
        .envelope-wrapper.open .letter {
            opacity: 1;
            transform: translateY(-220px) scale(1.4);
            z-index: 20;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        #animation-frame {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hint {
            margin-top: 0px;
            color: black;
            font-weight: bold;
            text-align: center;
            background: rgba(255,255,255,0.7);
            padding: 10px;
            border-radius: 10px;
            max-width: 400px;
        }
    </style>
</head>

        let currentIndex = 0;
        let isPlaying = false;
        let intervalId = null;
        const wrapper = document.getElementById('envelope');
        const imgElement = document.getElementById('animation-frame');
        const music = document.getElementById('bg-music');

        function startVideo() {
            if (!intervalId) {
                isPlaying = true;
                music.play().catch(e => console.log("Musik-Autoplay blockiert."));
                
                intervalId = setInterval(() => {
                    currentIndex = (currentIndex + 1) % images.length;
                    imgElement.src = images[currentIndex];
                }, 3000);
            }
        }

        function pauseVideo() {
            clearInterval(intervalId);
            intervalId = null;
            isPlaying = false;
            music.pause();
        }

        wrapper.addEventListener('click', () => {
            if (!wrapper.classList.contains('open')) {
                wrapper.classList.add('open');
                startVideo();
            } else {
                if (isPlaying) {
                    pauseVideo();
                } else {
                    startVideo();
                    music.play();
                }
            }
        });

        wrapper.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            wrapper.classList.remove('open');
            pauseVideo();
            music.pause();
            music.currentTime = 0;
            currentIndex = 0;
            imgElement.src = images[0];
        });

        function toggleNav() {
            var nav = document.getElementById("mySidenav");
            nav.style.width = (nav.style.width === "250px") ? "0" : "250px";
        }
