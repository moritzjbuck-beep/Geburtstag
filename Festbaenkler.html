
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bilder - Fäaschtbänkler</title>
    <style>
        body {
            background-color: #87CEEB;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- SIDENAV STYLES --- */
        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 10px 30px;
            text-decoration: none;
            font-size: 22px;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .sidenav a:hover { color: #f1f1f1; }

        .sidenav .closebtn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
        }

        .open-btn {
            font-size: 35px;
            cursor: pointer;
            position: fixed;
            top: 15px;
            left: 15px;
            color: white;
            z-index: 1500;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* --- TIPP BUTTON STYLES --- */
        #tipp-box {
            margin-top: 100px;
            z-index: 1000;
            text-align: center;
        }

        .tipp-btn {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .tipp-btn:hover {
            transform: scale(1.1);
            background-color: #ff6347;
        }

        #tipp-text {
            display: none;
            margin-top: 15px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            color: #333;
            cursor: pointer; /* Zeigt an, dass man klicken kann */
            user-select: none;
        }

        /* --- BILDER STYLES --- */
        .picture1 {
            height: auto;
            width: 400px;
            margin-top: 130px;
            margin-left: 180px;
        }

        .picture2 {
            height: auto;
            width: 400px;
            margin-top: 130px;
            margin-left: 80px;
        }

        .Biler-Fästbänkler {
            
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="Baenkler.mp3" type="audio/mpeg">
    </audio>

    <script>
        const passwort = prompt("Bitte gib das Passwort ein, um die Bilder zu sehen:");
        if (passwort !== "1288OmaOpa") {
            alert("Falsches Passwort!");
            window.location.href = "https://sz-folien.de/wp-content/uploads/2020/03/Art-Nr.386-Smily-Mittelfinger-1.jpg";
        }
    </script>

    <span class="open-btn" onclick="toggleNav()">&#9776; Menü</span>

    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">&times;</a>
        <a href="index.html">Startseite</a>
        <a href="images2.html">Bilder</a>
        
    </div>

    <div id="tipp-box">
        <button class="tipp-btn" onclick="playTipp()">💡 Hier klicken für einen Tipp & Musik</button>
        <div id="tipp-text" onclick="toggleMusic()">Tipp: Schau dir die Bilder und die leiste oben an, genieße die Musik! </div>
    </div>

    <div class="Biler-Fästbänkler">
        <img src="Eventime.png" class="picture1">
        <img src="Screen.png" class="picture2">
    </div>

    <script>
        /* Musik abspielen und Tipp zeigen */
        function playTipp() {
            var music = document.getElementById("bg-music");
            var btn = document.querySelector(".tipp-btn");
            var text = document.getElementById("tipp-text");

            // Musik starten
            music.play();

            // Button verstecken und Text zeigen
            btn.style.display = "none";
            text.style.display = "block";
        }

        /* Logik für Pause und Weiterspielen */
        function toggleMusic() {
            var music = document.getElementById("bg-music");
            if (music.paused) {
                music.play();
            } else {
                music.pause();
            }
        }

        /* JavaScript für die Seitenleiste */
        function toggleNav() {
            var nav = document.getElementById("mySidenav");
            if (nav.style.width === "250px") {
                nav.style.width = "0";
            } else {
                nav.style.width = "250px";
            }
        }
    </script>
</body>
</html>
